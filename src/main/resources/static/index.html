<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web</title>
    <link rel="stylesheet" href="/js/xterm/css/xterm.css" />
    <script src="/js/xterm/lib/xterm.js"></script>
    <script src="/js/addon-fit/lib/addon-fit.js"></script>
    <script src="/js/addon-attach/lib/addon-attach.js"></script>
    <style>
        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }
        .wrap-container{
            height: 100vh;
            display: flex;
            padding: 32px;
        }
        .wrap-container > * {
            flex: 1;
            height: 100%;
        }
        .result-container{
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
<div class="wrap-container">
    <div style="display: flex;flex-direction: column;">
        <div id="terminal"></div>
        <input id="commandInput" placeholder="请输入指令，按回车键下发" />
    </div>
    <div class="result-container">
        <div style="margin-bottom: 12px">
            <input placeholder="请输入书名" />
        </div>
        <div style="flex:1; overflow: auto">
            <ul id="resul-ul"></ul>
        </div>
    </div>
</div>
<script>
    const terminal = new Terminal({
        disableStdin: true,
    });
    const fitAddon = new FitAddon.FitAddon();
    terminal.loadAddon(fitAddon);
    terminal.open(document.getElementById('terminal'));
    fitAddon.fit();
    const hostname = window.location.hostname;
    const port = window.location.port;
    const protocol = window.location.protocol.startsWith('https') ? 'wss' : 'ws';
    let ws;
    const commandEle = document.getElementById('commandInput')

    const disableCommand = () => {
        commandEle.setAttribute('disabled', 'disabled');
    }
    const enableCommand = () => {
        commandEle.removeAttribute('disabled');
    }
    disableCommand()
    const initWebsocket = () => {
        terminal.clear()
        ws = new WebSocket(`${protocol}://${hostname}:${port}/ws`);
        ws.onopen = () => {
            console.log('WebSocket Open!');
        }
        ws.onmessage = (e) => {

            if(e.data.includes('==>')) {
                const splitArray = e.data.split('[m');
                if(splitArray.length > 1) {
                    if(splitArray[1].trim() === '') {
                        terminal.write(e.data)
                    }else{
                        terminal.writeln(e.data)
                    }
                }else{
                    terminal.write(e.data)
                }
                enableCommand()
            }else{
                terminal.writeln(e.data)
                disableCommand()
            }
        }
        ws.onerror = (e) => {
            setTimeout(() => {
                initWebsocket()
            }, 1000)
        }
    }
    initWebsocket()

    document.getElementById('commandInput').addEventListener('keydown', e => {
        if(e.key === 'Enter') {
            sendMessage()
        }
    })
    const sendMessage = () => {
        const value = document.getElementById('commandInput').value.trim();
        if(value && ws && ws.readyState === WebSocket.OPEN) {
            ws.send(value)
            document.getElementById('commandInput').value = ''
            terminal.writeln(value)
        }
    }
</script>
</body>
</html>
