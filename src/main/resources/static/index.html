<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <!-- 移动端视口设置 -->
  <!-- width=device-width → 宽度等于设备屏宽 -->
  <!-- initial-scale=1.0 → 初始缩放比例为 1 -->
  <!-- user-scalable=no → 禁止用户缩放 -->
  <!-- maximum-scale=1 → 最大缩放比例为 1 -->
  <meta content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1" name="viewport">
  <!-- 安卓/Chrome Web App 全屏显示 -->
  <meta content="yes" name="mobile-web-app-capable">
  <!-- iOS Safari 全屏显示 (保留兼容) -->
  <meta content="yes" name="apple-mobile-web-app-capable">
  <!-- 禁止 iOS 自动识别电话号码 -->
  <meta content="telephone=no" name="format-detection">
  <title>SoNovel WebUI</title>
  <link href="favicon.ico" rel="icon" type="image/x-icon">
  <link rel="stylesheet" href="/index.css">
</head>
<body>
<div class="wrap-container">
  <header class="header">
    <h1 class="app-title">SO NOVEL</h1>
    <a id="versionTag" class="version-tag" target="_blank">version</a>
    <button class="btn-settings" id="settingsToggle">设置</button>
  </header>

  <section class="container settings-container" id="settingsPanel" style="display:none">
    <h2 class="section-title">偏好设置</h2>
    <p class="settings-hint">以下设置仅保存在浏览器本地，不会修改服务器配置。</p>
    <div class="settings-grid">
      <div class="settings-item">
        <label for="settingFormat">下载格式</label>
        <select id="settingFormat">
          <option value="">跟随服务器配置</option>
          <option value="epub">EPUB</option>
          <option value="txt">TXT</option>
          <option value="html">HTML</option>
          <option value="pdf">PDF</option>
        </select>
      </div>
      <div class="settings-item">
        <label for="settingLanguage">书籍内容语言</label>
        <select id="settingLanguage">
          <option value="">自动</option>
          <option value="zh_CN">简体中文</option>
          <option value="zh_TW">繁体中文(台湾)</option>
          <option value="zh_Hant">繁体中文</option>
        </select>
      </div>
      <div class="settings-item">
        <label for="settingSearchLimit">每页显示数量</label>
        <input type="number" id="settingSearchLimit" min="10" placeholder="默认">
      </div>
      <div class="settings-item">
        <label for="settingConcurrency">下载并发限制</label>
        <input type="number" id="settingConcurrency" min="1" placeholder="默认">
      </div>
    </div>
  </section>

  <main class="main-content">
    <section class="container download-container" id="downloadContainer">
      <h2 class="section-title">搜索书籍</h2>
      <div class="search-container">
        <input id="downloadSearchName" placeholder="请输入书名或作者，尽量输完整" aria-label="搜索书名或作者">
        <button class="btn btn-primary btn-search" id="searchButton">搜索</button>
      </div>
      <div class="body-container" id="tb1">
        <div class="table-responsive">
          <table class="data-table">
            <thead>
            <tr>
              <th scope="col">No</th>
              <th scope="col">书名</th>
              <th scope="col">作者</th>
              <th scope="col">最新章节</th>
              <th scope="col">最后更新</th>
              <th scope="col">书源</th>
              <th scope="col">操作</th>
              <th scope="col">源站</th>
            </tr>
            </thead>
            <tbody id="downloadTableBody">
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="container result-container">
      <div class="section-header">
        <h2 class="section-title">已下书籍</h2>
        <button class="btn btn-primary" id="refreshList">刷新</button>
      </div>
      <div class="body-container" id="tb2">
        <div class="table-responsive">
          <table class="data-table">
            <thead>
            <tr>
              <th scope="col">文件名</th>
              <th scope="col">文件大小</th>
              <th scope="col">下载时间</th>
              <th scope="col">操作</th>
            </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
          </table>
        </div>
      </div>
    </section>

  </main>
</div>

<div class="loading-container" id="tipEle">
  <div class="content">
    <svg class="loading-icon" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="45" fill="none" stroke="#fff" stroke-width="8" stroke-dasharray="141.37 87.96"
              stroke-linecap="round"></circle>
    </svg>
    <span class="text" id="tipText">正在下载</span>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    // DOM 元素引用
    const downloadContainer = document.getElementById('downloadContainer')
    const downloadSearchName = document.getElementById('downloadSearchName')
    const searchButton = document.getElementById('searchButton')
    const refreshListButton = document.getElementById('refreshList')
    const downloadTableBody = document.getElementById('downloadTableBody')
    const tableBody = document.getElementById('tableBody')
    const tipEle = document.getElementById('tipEle')
    const tipText = document.getElementById('tipText')
    const versionTag = document.getElementById("versionTag");
    const tb1 = document.getElementById('tb1');
    const tb2 = document.getElementById('tb2');

    let bookCache = []
    let currentPage = 1
    // 最新下载的书的文件名
    let latestFileName = ''

    // 设置面板相关
    const settingsToggle = document.getElementById('settingsToggle')
    const settingsPanel = document.getElementById('settingsPanel')
    const settingFormat = document.getElementById('settingFormat')
    const settingLanguage = document.getElementById('settingLanguage')
    const settingSearchLimit = document.getElementById('settingSearchLimit')
    const settingConcurrency = document.getElementById('settingConcurrency')

    const SETTINGS_KEY = 'sonovel-settings'
    // 服务器配置限制值
    let serverConfig = { searchLimit: -1, concurrency: -1 }

    const loadSettings = () => {
      try {
        const saved = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}')
        settingFormat.value = saved.format || ''
        settingLanguage.value = saved.language || ''
        settingSearchLimit.value = saved.searchLimit || ''
        settingConcurrency.value = saved.concurrency || ''
      } catch (_) {}
    }

    const saveSettings = () => {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify({
        format: settingFormat.value,
        language: settingLanguage.value,
        searchLimit: settingSearchLimit.value,
        concurrency: settingConcurrency.value,
      }))
    }

    // 确保输入值不超过配置文件限制
    const clampSetting = (input, configVal, fallbackMax, min = 1) => {
      const max = configVal > 0 ? configVal : fallbackMax
      input.min = min
      input.max = max
      input.addEventListener('change', () => {
        const v = parseInt(input.value)
        if (v > max) input.value = max
        if (v < min && input.value !== '') input.value = min
        saveSettings()
      })
    }

    const fetchConfig = async () => {
      try {
        const resp = await fetch('/config')
        const data = await resp.json()

        if (data && data.data) {
          serverConfig = data.data
          clampSetting(settingSearchLimit, -1, 100, 10)
          clampSetting(settingConcurrency, serverConfig.concurrency, 50)

          console.log('version:', serverConfig.version)
          versionTag.innerText = serverConfig.version
          versionTag.href = `https://github.com/freeok/so-novel/releases/tag/v${serverConfig.version}`
        }
      } catch (_) {
        clampSetting(settingSearchLimit, -1, 100, 10)
        clampSetting(settingConcurrency, -1, 50)
      }
    }

    const updateDefaultFormatLabels = () => {
      const defaultExt = settingFormat.value ? settingFormat.value.toUpperCase() : serverConfig.extName.toUpperCase()
      document.querySelectorAll('.dropdown-item.default-format').forEach(el => {
        el.textContent = `${defaultExt} (默认)`
      })
    }

    settingsToggle.addEventListener('click', () => {
      settingsPanel.style.display = settingsPanel.style.display === 'none' ? '' : 'none'
    })
    settingFormat.addEventListener('change', () => {
      saveSettings()
      updateDefaultFormatLabels()
    })
    settingLanguage.addEventListener('change', saveSettings)
    settingSearchLimit.addEventListener('change', () => {
      if (bookCache.length > 0) {
        currentPage = 1
        renderDownloadTable()
      }
    })

    // 工具函数
    const showTip = (text = '正在加载...') => {
      tipText.innerHTML = text
      tipEle.style.display = 'flex'
    }

    const updateTip = (text) => {
      tipText.innerHTML = text
    }

    const hideTip = () => {
      tipEle.style.display = 'none'
    }

    const formatSize = (bytes) => {
      if (bytes === 0) return '0.00 B'
      const k = 1024
      const sizes = ['B', 'KB', 'MB', 'GB']
      const i = Math.floor(Math.log(bytes) / Math.log(k))
      const sizeValue = (bytes / Math.pow(k, i)).toFixed(2)
      return `${sizeValue} ${sizes[i]}`
    }

    const formatDate = (timestamp) => {
      const date = new Date(timestamp)
      return date.toLocaleString('zh-CN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      })
    }

    // 事件处理函数
    const handleDownloadFileToLocal = (name) => {
      console.log('download to local', `《${name}》`)
      window.open(`${window.location.origin}/book-download?filename=${encodeURIComponent(name)}`, '_blank')
    }

    const handleDownloadToServer = async (index, format) => {
      const item = bookCache[index]
      if (!item) {
        alert('参数错误，请重新搜索')
        return
      }
      // 在发起请求前，显示弹窗
      showTip(`正在解析目录...`)
      const params = new URLSearchParams(item)
      const finalFormat = format || settingFormat.value || ''
      if (finalFormat) {
        params.set('format', finalFormat)
      }
      const language = settingLanguage.value
      if (language) {
        params.set('language', language)
      }
      if (settingConcurrency.value) {
        params.set('concurrency', settingConcurrency.value)
      }
      try {
        await fetch(`/book-fetch?${params.toString()}`)
        await fetchLocalBooks()
        // fetch 会把响应当成 XHR 请求，返回一个 Response 对象，不会走浏览器默认的下载流程
        window.location.href = `/book-download?filename=${latestFileName}`
      } catch (error) {
        console.error('Error downloading file to server:', error)
        updateTip('下载失败')
      } finally {
        hideTip()
      }
    }

    const getPageSize = () => {
      const v = parseInt(settingSearchLimit.value)
      return v > 0 ? v : 20
    }

    const renderDownloadTable = (data) => {
      if (data !== undefined) bookCache = data
      const pageSize = getPageSize()
      const totalPages = Math.max(1, Math.ceil(bookCache.length / pageSize))
      if (currentPage > totalPages) currentPage = totalPages
      if (currentPage < 1) currentPage = 1

      const start = (currentPage - 1) * pageSize
      const end = Math.min(start + pageSize, bookCache.length)
      const pageData = bookCache.slice(start, end)

      const defaultExt = settingFormat.value ? settingFormat.value.toUpperCase() : serverConfig.extName.toUpperCase()
      downloadTableBody.innerHTML = pageData.map((item, i) => {
        const index = start + i
        return `
      <tr>
        <td data-label="No">${index + 1}</td>
        <td data-label="书名">${item.bookName}</td>
        <td data-label="作者">${item.author}</td>
        <td data-label="最新章节">${item.latestChapter || ''}</td>
        <td data-label="最后更新">${item.lastUpdateTime || ''}</td>
        <td data-label="书源">${item.sourceName}</td>
        <td data-label="操作">
          <div class="download-action">
            <button class="dropdown-toggle" data-index="${index}">下载为 <span class="dropdown-arrow">▾</span></button>
            <div class="dropdown-menu">
              <div class="dropdown-item default-format" data-format="" data-index="${index}">${defaultExt} (默认)</div>
              <div class="dropdown-item" data-format="epub" data-index="${index}">EPUB</div>
              <div class="dropdown-item" data-format="txt" data-index="${index}">TXT</div>
              <div class="dropdown-item" data-format="html" data-index="${index}">HTML</div>
              <div class="dropdown-item" data-format="pdf" data-index="${index}">PDF</div>
            </div>
          </div>
        </td>
        <td data-label="源站"><a href="${item.url}" target="_blank"><button class="btn btn-secondary btn-download">前往</button></a></td>
      </tr>`
      }).join('')

      renderPagination(totalPages)

      if (bookCache.length > 0) {
        tb1.style.display = ''
      }
    }

    const renderPagination = (totalPages) => {
      let paginationEl = document.getElementById('pagination')
      if (totalPages <= 1) {
        if (paginationEl) paginationEl.remove()
        return
      }
      if (!paginationEl) {
        paginationEl = document.createElement('div')
        paginationEl.id = 'pagination'
        paginationEl.className = 'pagination'
        tb1.appendChild(paginationEl)
      }

      let html = `<span class="pagination-info">共 ${bookCache.length} 条，第 ${currentPage}/${totalPages} 页</span>`
      html += `<div class="pagination-btns">`
      html += `<button class="page-btn" data-page="prev" ${currentPage <= 1 ? 'disabled' : ''}>上一页</button>`

      const maxVisible = 5
      let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2))
      let endPage = Math.min(totalPages, startPage + maxVisible - 1)
      if (endPage - startPage < maxVisible - 1) startPage = Math.max(1, endPage - maxVisible + 1)

      if (startPage > 1) {
        html += `<button class="page-btn" data-page="1">1</button>`
        if (startPage > 2) html += `<span class="page-ellipsis">…</span>`
      }
      for (let i = startPage; i <= endPage; i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`
      }
      if (endPage < totalPages) {
        if (endPage < totalPages - 1) html += `<span class="page-ellipsis">…</span>`
        html += `<button class="page-btn" data-page="${totalPages}">${totalPages}</button>`
      }

      html += `<button class="page-btn" data-page="next" ${currentPage >= totalPages ? 'disabled' : ''}>下一页</button>`
      html += `</div>`
      paginationEl.innerHTML = html
    }

    const renderLocalBooksTable = (data) => {
      tableBody.innerHTML = data.map(item => `
      <tr>
        <td data-label="文件名">${item.name}</td>
        <td data-label="文件大小">${formatSize(item.size)}</td>
        <td data-label="下载时间">${formatDate(item.timestamp)}</td>
        <td data-label="操作"><button class="btn btn-secondary btn-download" data-filename="${item.name}">下载</button></td>
      </tr>
    `).join('')
      if (data.length > 0) {
        tb2.style.display = ''
      }
    }

    // 已下书籍
    const fetchLocalBooks = async () => {
      showTip('正在刷新...')
      try {
        const response = await fetch('/local-books')
        const data = await response.json()
        console.log('local-books:', data)
        if (data && data.data) {
          data.data.sort((a, b) => b.timestamp - a.timestamp)
          if (data.data[0]) {
            latestFileName = data.data[0].name
          }
          renderLocalBooksTable(data.data)
        }
      } catch (error) {
        console.error('Error fetching file list:', error)
        updateTip('刷新失败')
      } finally {
        hideTip()
      }
    }

    const aggregatedSearch = async () => {
      const value = downloadSearchName.value.trim()
      if (!value) {
        alert("请输入书名或作者！")
        return
      }
      showTip('正在搜索...')
      searchButton.disabled = true // 搜索时禁用按钮
      downloadSearchName.disabled = true // 搜索时禁用输入框
      try {
        const searchUrl = `/search/aggregated?kw=${encodeURIComponent(value)}`
        const response = await fetch(searchUrl)
        const data = await response.json()
        console.log('search results', data)
        if (data && data.data) {
          currentPage = 1
          renderDownloadTable(data.data)
        }
      } catch (error) {
        console.error('Error searching files:', error)
        updateTip('搜索失败')
      } finally {
        hideTip()
        downloadContainer.classList.add('expanded')
        searchButton.disabled = false // 搜索完成后启用按钮
        downloadSearchName.disabled = false // 搜索完成后启用输入框
      }
    }

    const initSSE = () => {
      // 相对路径更稳健，自动适配 http/https、端口和域名
      const evtSource = new EventSource("/download-progress")

      evtSource.onopen = (event) => {
        console.log("✅ SSE 连接已打开")
      }

      evtSource.onerror = (event) => {
        console.warn("⚠️ SSE 连接异常，浏览器将自动重连", event)
      }

      evtSource.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data)
          if (data.type === "download-progress") {
            updateTip(`进度: ${data.index} / ${data.total}`)
          }
        } catch (err) {
          console.error("❌ SSE 数据解析失败:", err, e.data)
        }
      }
    }

    // 事件监听器
    searchButton.addEventListener('click', aggregatedSearch)
    refreshListButton.addEventListener('click', fetchLocalBooks)

    // 按下 Enter 键触发搜索
    downloadSearchName.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        aggregatedSearch()
      }
    })

    // 使用事件委托处理分页按钮
    tb1.addEventListener('click', (e) => {
      const pageBtn = e.target.closest('.page-btn')
      if (pageBtn && !pageBtn.disabled) {
        const page = pageBtn.dataset.page
        const totalPages = Math.ceil(bookCache.length / getPageSize())
        if (page === 'prev') currentPage--
        else if (page === 'next') currentPage++
        else currentPage = parseInt(page)
        currentPage = Math.max(1, Math.min(currentPage, totalPages))
        renderDownloadTable()
        tb1.scrollIntoView({ behavior: 'smooth', block: 'start' })
      }
    })

    // 使用事件委托处理下载下拉菜单
    downloadTableBody.addEventListener('click', (e) => {
      const toggle = e.target.closest('.dropdown-toggle')
      if (toggle) {
        e.stopPropagation()
        const action = toggle.closest('.download-action')
        // 关闭其他已展开的下拉菜单
        document.querySelectorAll('.download-action.open').forEach(el => {
          if (el !== action) el.classList.remove('open')
        })
        action.classList.toggle('open')
        return
      }
      const item = e.target.closest('.dropdown-item')
      if (item) {
        item.closest('.download-action').classList.remove('open')
        handleDownloadToServer(item.dataset.index, item.dataset.format)
      }
    })

    // 点击页面其他区域关闭下拉菜单
    document.addEventListener('click', () => {
      document.querySelectorAll('.download-action.open').forEach(el => el.classList.remove('open'))
    })

    tableBody.addEventListener('click', (e) => {
      const button = e.target.closest('button.btn-secondary')
      if (button && button.dataset.filename) {
        handleDownloadFileToLocal(button.dataset.filename)
      }
    })

    // 页面加载时执行
    initSSE()
    loadSettings()
    fetchConfig()
    fetchLocalBooks()
    tb1.style.display = 'none';
    tb2.style.display = 'none';
  })
</script>
</body>
</html>
