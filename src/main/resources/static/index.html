<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <!-- 移动端视口设置 -->
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
        name="viewport">
  <!-- 安卓/Chrome Web App 全屏显示 -->
  <meta content="yes" name="mobile-web-app-capable">
  <!-- iOS Safari 全屏显示 (保留兼容) -->
  <meta content="yes" name="apple-mobile-web-app-capable">
  <!-- 禁止 iOS 自动识别电话号码 -->
  <meta content="telephone=no" name="format-detection">
  <title>SoNovel WebUI</title>
  <link href="favicon.ico" rel="icon">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#5d5d81', 'primary-hover': '#7b7b9d' },
          fontFamily: {
            sans: ['Roboto', 'Helvetica Neue', 'Helvetica', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Arial', 'sans-serif'],
            serif: ['Noto Serif SC', 'PingFang SC', 'Heiti SC', 'Microsoft YaHei', 'Times New Roman', 'serif']
          }
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] {
      display: none !important
    }

    html {
      scrollbar-gutter: stable;
      overflow-y: scroll
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans leading-relaxed min-h-screen overflow-x-hidden"
      x-data="App()" x-init="init()">

<div class="max-w-5xl mx-auto px-4 py-4 sm:px-6 sm:py-6 flex flex-col min-h-screen" x-cloak>
  <header class="relative flex flex-col items-center mb-6 sm:mb-8 pt-2 pb-1">
    <!-- LOGO -->
    <div class="flex items-center gap-2.5 sm:gap-3">
      <h1 class="m-0 flex items-baseline gap-1.5 sm:gap-2">
        <span class="text-2xl sm:text-4xl font-light text-gray-700 tracking-wide">SO</span>
        <span class="text-2xl sm:text-4xl font-light text-gray-700 tracking-wide">NOVEL</span>
      </h1>
    </div>
    <div class="mt-3 h-px w-20 bg-gradient-to-r from-transparent via-primary/30 to-transparent"></div>
    <a :href="versionLink"
       class="mt-2.5 inline-flex items-center text-xs sm:text-sm text-green-700 bg-green-50 px-2.5 py-0.5 rounded-full no-underline hover:bg-green-100 transition-colors ring-1 ring-green-200/60"
       target="_blank"
       x-text="'v' + (serverConfig.version || 'ersion')"></a>
    <button @click="settingsVisible = !settingsVisible"
            class="absolute right-0 top-1/2 -translate-y-1/2 flex items-center gap-2 text-xs text-gray-400 hover:text-primary transition-colors">
      <span>设置</span>
      <span class="relative inline-flex items-center w-9 h-5 rounded-full transition-colors duration-200"
            :class="settingsVisible ? 'bg-primary' : 'bg-gray-300'">
        <span class="inline-block w-3.5 h-3.5 bg-white rounded-full shadow transition-transform duration-200"
              :class="settingsVisible ? 'translate-x-[18px]' : 'translate-x-[3px]'"></span>
      </span>
    </button>
  </header>

  <!-- 设置面板 -->
  <section class="relative mb-6 bg-white rounded-xl shadow-md p-4 sm:p-6" x-show="settingsVisible" x-transition>
    <h2 class="text-lg sm:text-2xl font-semibold text-primary border-l-4 border-primary pl-3 my-3">偏好设置</h2>
    <button @click="showSources = true; fetchSources()"
            class="absolute right-4 sm:right-6 top-4 sm:top-6 text-sm text-gray-400 hover:text-primary px-2 py-1 rounded border border-gray-200 hover:border-primary transition-colors">
      书源列表
    </button>
    <p class="text-sm text-gray-500 mb-4">以下设置仅保存在浏览器本地，不会修改服务器配置。</p>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-x-8 sm:gap-y-5">
      <div class="flex flex-col gap-1.5 min-w-0">
        <label class="text-sm font-medium text-gray-600">下载格式</label>
        <select @change="handleSettingChange"
                class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm bg-white focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10"
                x-model="settings.format">
          <option value="">跟随服务器配置</option>
          <option value="epub">EPUB</option>
          <option value="txt">TXT</option>
          <option value="html">HTML</option>
          <option value="pdf">PDF</option>
        </select>
      </div>
      <div class="flex flex-col gap-1.5 min-w-0">
        <label class="text-sm font-medium text-gray-600">书籍内容语言</label>
        <select @change="handleSettingChange"
                class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm bg-white focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10"
                x-model="settings.language">
          <option value="">自动</option>
          <option value="zh_CN">简体中文</option>
          <option value="zh_TW">繁体中文(台湾)</option>
          <option value="zh_Hant">繁体中文</option>
        </select>
      </div>
      <div class="flex flex-col gap-1.5 min-w-0">
        <label class="text-sm font-medium text-gray-600">每页显示数量</label>
        <input :max="searchLimitMax" :min="10" @change="validateAndSaveSettings('searchLimit')"
               class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm bg-white focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10"
               placeholder="默认"
               type="number" x-model.number="settings.searchLimit">
      </div>
      <div class="flex flex-col gap-1.5 min-w-0">
        <label class="text-sm font-medium text-gray-600">下载并发限制</label>
        <input :max="concurrencyMax" :min="1" @change="validateAndSaveSettings('concurrency')"
               class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm bg-white focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10"
               placeholder="默认"
               type="number" x-model.number="settings.concurrency">
      </div>
    </div>
  </section>

  <main class="flex flex-col gap-6 flex-1">
    <!-- 搜索区域 -->
    <section class="bg-white rounded-xl shadow-md p-4 sm:p-6" id="downloadContainer">
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-lg sm:text-2xl font-semibold text-primary border-l-4 border-primary pl-3 my-3">搜索书籍</h2>
        <button @click="showSearchHistory = !showSearchHistory"
                class="text-xs text-gray-400 hover:text-primary p-1.5 rounded border border-gray-200 hover:border-primary transition-colors"
                title="历史记录">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12,6 12,12 16,14" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="relative mb-5">
        <input :disabled="isSearching"
               @keydown.enter="aggregatedSearch"
               @input.debounce.300ms="fetchSuggestions" @blur="closeSuggestions"
               aria-label="搜索书名或作者"
               autocomplete="off"
               class="w-full pl-4 pr-12 py-3 border border-gray-200 rounded-xl text-base bg-gray-50 focus:outline-none focus:border-primary focus:bg-white focus:ring-2 focus:ring-primary/10 disabled:bg-gray-100 disabled:text-gray-400 disabled:cursor-not-allowed transition-all"
               placeholder="请输入书名或作者，尽量输完整" x-model="searchKeyword">
        <button :disabled="isSearching" @click="aggregatedSearch"
                aria-label="搜索"
                class="absolute right-2 top-1/2 -translate-y-1/2 p-2 rounded-lg text-gray-400 hover:text-primary hover:bg-primary/5 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div x-show="showSuggestions && suggestions.length > 0"
             class="absolute z-50 left-0 right-0 top-full mt-1 bg-white border border-gray-200 rounded-xl shadow-lg overflow-hidden">
          <template x-for="(s, i) in suggestions" :key="i">
            <div @mousedown.prevent="selectSuggestion(i)"
                 class="px-4 py-2 text-sm cursor-pointer text-gray-700 hover:bg-gray-50"
                 x-text="s"></div>
          </template>
        </div>
      </div>

      <!-- 搜索结果 桌面端 -->
      <div x-show="bookCache.length > 0" x-transition>
        <div class="hidden md:block overflow-visible rounded-lg border border-gray-200">
          <table class="w-full text-sm">
            <thead class="bg-gray-100 sticky top-0">
            <tr>
              <th class="px-3 py-2 text-left font-semibold text-gray-500">No</th>
              <th class="px-3 py-2 text-left font-semibold text-gray-500">书名</th>
              <th class="px-3 py-2 text-left font-semibold text-gray-500">作者</th>
              <th class="px-3 py-2 text-left font-semibold text-gray-500">最新章节</th>
              <th class="px-3 py-2 text-left font-semibold text-gray-500">最后更新</th>
              <th class="px-3 py-2 text-left font-semibold text-gray-500">源站</th>
              <th class="px-3 py-2 text-left font-semibold text-gray-500">操作</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
            <template :key="item.url + '-' + index" x-for="(item, index) in paginatedBooks">
              <tr class="hover:bg-gray-50 transition-colors">
                <td class="px-3 py-2" x-text="getGlobalIndex(index)"></td>
                <td class="px-3 py-2 font-medium" x-text="item.bookName"></td>
                <td class="px-3 py-2 text-gray-600 whitespace-nowrap" x-text="item.author"></td>
                <td class="px-3 py-2 text-gray-600" x-text="item.latestChapter || ''"></td>
                <td class="px-3 py-2 text-gray-500 text-xs" x-text="item.lastUpdateTime || ''"></td>
                <td class="px-3 py-2 text-gray-600">
                  <a :href="item.url" target="_blank" class="text-primary hover:underline" x-text="item.sourceName"></a>
                </td>
                <td class="px-3 py-2 overflow-visible whitespace-nowrap">
                  <button @click.stop="toggleDownloadMenu(index, item, $event)"
                          class="p-1.5 border border-gray-200 rounded-md bg-gray-100 text-primary hover:bg-gray-200 transition-colors"
                          title="选择下载格式"
                          x-html="iconDownload"></button>
                </td>
              </tr>
            </template>
            </tbody>
          </table>
        </div>

        <!-- 搜索结果 移动端 -->
        <div class="md:hidden space-y-4">
          <template :key="'m-' + item.url + '-' + index" x-for="(item, index) in paginatedBooks">
            <div class="border border-gray-200 rounded-lg p-3 shadow-sm bg-white">
              <div class="flex justify-between items-start gap-2 py-1.5 border-b border-gray-100">
                <span class="text-sm font-semibold text-gray-500 shrink-0">No</span>
                <span class="text-sm text-right" x-text="getGlobalIndex(index)"></span>
              </div>
              <div class="flex justify-between items-start gap-2 py-1.5 border-b border-gray-100"
                   x-show="item.bookName">
                <span class="text-sm font-semibold text-gray-500 shrink-0">书名</span>
                <span class="text-sm font-medium text-right break-all" x-text="item.bookName"></span>
              </div>
              <div class="flex justify-between items-start gap-2 py-1.5 border-b border-gray-100" x-show="item.author">
                <span class="text-sm font-semibold text-gray-500 shrink-0">作者</span>
                <span class="text-sm text-right" x-text="item.author"></span>
              </div>
              <div class="flex justify-between items-start gap-2 py-1.5 border-b border-gray-100"
                   x-show="item.latestChapter">
                <span class="text-sm font-semibold text-gray-500 shrink-0">最新章节</span>
                <span class="text-sm text-right break-all" x-text="item.latestChapter"></span>
              </div>
              <div class="flex justify-between items-start gap-2 py-1.5 border-b border-gray-100"
                   x-show="item.lastUpdateTime">
                <span class="text-sm font-semibold text-gray-500 shrink-0">最后更新</span>
                <span class="text-sm text-gray-500 text-right" x-text="item.lastUpdateTime"></span>
              </div>
              <div class="flex justify-between items-start gap-2 py-1.5 border-b border-gray-100"
                   x-show="item.sourceName">
                <span class="text-sm font-semibold text-gray-500 shrink-0">前往源站</span>
                <a :href="item.url" target="_blank" class="text-sm text-right text-primary hover:underline"
                   x-text="item.sourceName"></a>
              </div>
              <div class="flex justify-between items-center gap-2 py-2 border-b border-gray-100">
                <span class="text-sm font-semibold text-gray-500 shrink-0">操作</span>
                <button @click.stop="toggleDownloadMenu(index, item, $event)"
                        class="inline-flex items-center justify-center gap-0.5 py-1.5 px-2 border border-gray-200 rounded-md bg-gray-100 text-primary hover:bg-gray-200 transition-colors"
                        title="选择下载格式">
                  <span x-html="iconDownload"></span>
                </button>
              </div>
            </div>
          </template>
        </div>

        <div class="flex flex-col sm:flex-row items-center justify-between gap-3 mt-4 pt-4 border-t border-gray-200"
             x-show="totalPages > 1">
          <span class="text-sm text-gray-500"
                x-text="'共 ' + bookCache.length + ' 条，第 ' + currentPage + '/' + totalPages + ' 页'"></span>
          <div class="flex flex-wrap items-center justify-center gap-1">
            <button :disabled="currentPage <= 1" @click="changePage('prev')"
                    class="min-w-8 h-8 px-2 text-sm border border-gray-200 rounded-md hover:border-primary hover:text-primary disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
              上一页
            </button>
            <template x-if="paginationInfo.start > 1">
              <button @click="changePage(1)"
                      class="min-w-8 h-8 px-2 text-sm border border-gray-200 rounded-md hover:border-primary hover:text-primary transition-colors">
                1
              </button>
            </template>
            <template x-if="paginationInfo.start > 2">
              <span class="px-1 text-gray-400 text-sm">…</span>
            </template>
            <template :key="p" x-for="p in paginationInfo.pages">
              <button
                :class="p === currentPage ? 'bg-primary border-primary text-white' : 'border-gray-200 hover:border-primary hover:text-primary'"
                @click="changePage(p)"
                class="min-w-8 h-8 px-2 text-sm border rounded-md transition-colors"
                x-text="p"></button>
            </template>
            <template x-if="paginationInfo.end < totalPages - 1">
              <span class="px-1 text-gray-400 text-sm">…</span>
            </template>
            <template x-if="paginationInfo.end < totalPages">
              <button @click="changePage(totalPages)"
                      class="min-w-8 h-8 px-2 text-sm border border-gray-200 rounded-md hover:border-primary hover:text-primary transition-colors"
                      x-text="totalPages"></button>
            </template>
            <button :disabled="currentPage >= totalPages" @click="changePage('next')"
                    class="min-w-8 h-8 px-2 text-sm border border-gray-200 rounded-md hover:border-primary hover:text-primary disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
              下一页
            </button>
          </div>
        </div>
      </div>
    </section>

    <section class="bg-white rounded-xl shadow-md p-4 sm:p-6">
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-lg sm:text-2xl font-semibold text-primary border-l-4 border-primary pl-3 my-0">已下书籍</h2>
        <button @click="fetchLocalBooks"
                class="text-xs text-gray-400 hover:text-primary p-1.5 rounded border border-gray-200 hover:border-primary transition-colors"
                title="刷新">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
              stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <div x-show="localBooks.length > 0" x-transition>
        <!-- 已下书籍 桌面端 -->
        <div class="hidden md:block overflow-x-auto rounded-lg border border-gray-200">
          <table class="w-full text-sm">
            <thead class="bg-gray-100">
            <tr>
              <th class="px-3 py-2 text-left font-semibold text-gray-500">文件名</th>
              <th class="px-3 py-2 text-left font-semibold text-gray-500">文件大小</th>
              <th class="px-3 py-2 text-left font-semibold text-gray-500">下载时间</th>
              <th class="px-3 py-2 text-left font-semibold text-gray-500">操作</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
            <template :key="item.name" x-for="item in localBooks">
              <tr class="hover:bg-gray-50">
                <td class="px-3 py-2 font-medium" x-text="item.name"></td>
                <td class="px-3 py-2 text-gray-600" x-text="formatSize(item.size)"></td>
                <td class="px-3 py-2 text-gray-500 text-xs" x-text="formatDate(item.timestamp)"></td>
                <td class="px-3 py-2">
                  <div class="flex items-center gap-2">
                    <button @click="handleDownloadFileToLocal(item.name)"
                            class="p-1.5 border border-gray-200 rounded-md bg-gray-100 text-primary hover:bg-gray-200 transition-colors"
                            title="下载"
                            x-html="iconDownload"></button>
                    <button @click="handleDeleteBook(item.name)"
                            class="p-1.5 border border-red-200 rounded-md bg-red-50 text-red-500 hover:bg-red-100 transition-colors"
                            title="删除"
                            x-html="iconDelete"></button>
                  </div>
                </td>
              </tr>
            </template>
            </tbody>
          </table>
        </div>

        <!-- 已下书籍 移动端 -->
        <div class="md:hidden space-y-4">
          <template :key="'lm-' + item.name" x-for="item in localBooks">
            <div class="border border-gray-200 rounded-lg p-3 shadow-sm bg-white">
              <div class="flex justify-between items-start gap-2 py-1.5 border-b border-gray-100">
                <span class="text-sm font-semibold text-gray-500 shrink-0">文件名</span>
                <span class="text-sm font-medium text-right break-all" x-text="item.name"></span>
              </div>
              <div class="flex justify-between items-start gap-2 py-1.5 border-b border-gray-100">
                <span class="text-sm font-semibold text-gray-500 shrink-0">文件大小</span>
                <span class="text-sm text-right" x-text="formatSize(item.size)"></span>
              </div>
              <div class="flex justify-between items-start gap-2 py-1.5 border-b border-gray-100">
                <span class="text-sm font-semibold text-gray-500 shrink-0">下载时间</span>
                <span class="text-sm text-gray-500 text-right" x-text="formatDate(item.timestamp)"></span>
              </div>
              <div class="flex justify-between items-center gap-2 py-2">
                <span class="text-sm font-semibold text-gray-500 shrink-0">操作</span>
                <div class="flex items-center gap-2">
                  <button @click="handleDownloadFileToLocal(item.name)"
                          class="p-1.5 border border-gray-200 rounded-md bg-gray-100 text-primary hover:bg-gray-200 transition-colors"
                          title="下载"
                          x-html="iconDownload"></button>
                  <button @click="handleDeleteBook(item.name)"
                          class="p-1.5 border border-red-200 rounded-md bg-red-50 text-red-500 hover:bg-red-100 transition-colors"
                          title="删除"
                          x-html="iconDelete"></button>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </section>

  </main>
</div>

<!-- 下载格式下拉菜单（fixed 定位，避免被表格 overflow 裁剪） -->
<div :style="dropdownStyle" @click.outside="closeDownloadMenu()"
     x-transition:enter="transition ease-out duration-150" x-transition:enter-end="opacity-100 scale-100"
     x-transition:enter-start="opacity-0 scale-95"
     x-transition:leave="transition ease-in duration-100" x-transition:leave-end="opacity-0 scale-95"
     class="fixed z-[100] w-36 bg-white rounded-xl shadow-xl border border-gray-200 py-1.5"
     x-cloak x-show="dropdownItem"
     x-transition:leave-start="opacity-100 scale-100">
  <button @click="handleDownloadToServer(dropdownItem, '')"
          class="w-full text-left px-4 py-2 text-sm font-medium text-primary hover:bg-gray-50"
          x-text="defaultExtLabel + ' (默认)'"></button>
  <button @click="handleDownloadToServer(dropdownItem, 'epub')"
          class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50"
          x-show="defaultExtLabel !== 'EPUB'">EPUB
  </button>
  <button @click="handleDownloadToServer(dropdownItem, 'txt')"
          class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50"
          x-show="defaultExtLabel !== 'TXT'">TXT
  </button>
  <button @click="handleDownloadToServer(dropdownItem, 'html')"
          class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50"
          x-show="defaultExtLabel !== 'HTML'">HTML
  </button>
  <button @click="handleDownloadToServer(dropdownItem, 'pdf')"
          class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50"
          x-show="defaultExtLabel !== 'PDF'">PDF
  </button>
</div>

<!-- Loading 弹窗 -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm" x-cloak
     x-transition:enter="transition ease-out duration-200" x-transition:enter-end="opacity-100"
     x-transition:enter-start="opacity-0"
     x-transition:leave="transition ease-in duration-150" x-transition:leave-end="opacity-0"
     x-show="showTip"
     x-transition:leave-start="opacity-100">
  <div class="w-full max-w-sm rounded-2xl bg-white p-6 shadow-2xl ring-1 ring-gray-900/5"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 translate-y-2 scale-95"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-end="opacity-0 translate-y-2 scale-95"
       x-transition:enter-end="opacity-100 translate-y-0 scale-100"
       x-transition:leave-start="opacity-100 translate-y-0 scale-100">
    <div class="flex flex-col items-center gap-4 text-center">
      <div class="relative flex h-12 w-12 items-center justify-center">
        <div class="absolute inset-0 rounded-full border-4 border-gray-100"></div>
        <div class="absolute inset-0 animate-spin rounded-full border-4 border-transparent border-t-primary"></div>
      </div>
      <div class="w-full">
        <p class="text-base font-semibold text-gray-900">请稍候</p>
        <template x-if="downloadTotal > 0">
          <div class="w-full mt-3">
            <div class="flex justify-between text-xs text-gray-500 mb-1.5">
              <span x-text="'下载中 ' + downloadCurrent + ' / ' + downloadTotal"></span>
              <span x-text="Math.round(downloadCurrent / downloadTotal * 100) + '%'"></span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden">
              <div :style="'width: ' + (downloadCurrent / downloadTotal * 100) + '%'"
                   class="bg-primary h-2.5 rounded-full transition-all duration-300 ease-out"></div>
            </div>
          </div>
        </template>
        <template x-if="downloadTotal === 0">
          <p class="mt-1 text-sm text-gray-500" x-text="tipText"></p>
        </template>
      </div>
    </div>
  </div>
</div>

<!-- 搜索历史 -->
<div @click.self="showSearchHistory = false"
     class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm"
     x-transition:enter="transition ease-out duration-200" x-transition:enter-end="opacity-100"
     x-transition:enter-start="opacity-0"
     x-transition:leave="transition ease-in duration-150" x-transition:leave-end="opacity-0"
     x-cloak
     x-show="showSearchHistory"
     x-transition:leave-start="opacity-100">
  <div class="w-full max-w-lg rounded-2xl bg-white p-6 shadow-2xl ring-1 ring-gray-900/5 max-h-[80vh] flex flex-col"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 translate-y-2 scale-95"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-end="opacity-0 translate-y-2 scale-95"
       x-transition:enter-end="opacity-100 translate-y-0 scale-100"
       x-transition:leave-start="opacity-100 translate-y-0 scale-100">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-lg font-semibold text-gray-800">搜索历史</h3>
      <button @click="showSearchHistory = false" class="text-gray-400 hover:text-gray-600 text-xl leading-none">
        &times;
      </button>
    </div>
    <div class="flex-1 overflow-y-auto -mx-2 px-2" x-show="searchHistory.length > 0">
      <template :key="h.timestamp" x-for="h in searchHistory">
        <div @click="selectHistory(h)"
             class="flex items-center justify-between px-3 py-2.5 rounded-lg cursor-pointer hover:bg-gray-50 group">
          <span class="text-sm text-gray-700" x-text="h.keyword"></span>
          <div class="flex items-center gap-2">
            <span class="text-xs text-gray-400 shrink-0" x-text="formatHistoryTime(h.timestamp)"></span>
            <button @click.stop="removeSearchHistory(h.timestamp)"
                    class="text-gray-300 hover:text-red-500 leading-none">&times;
            </button>
          </div>
        </div>
      </template>
    </div>
    <div class="text-center py-8 text-sm text-gray-400" x-show="searchHistory.length === 0">暂无搜索历史</div>
    <div class="mt-3 pt-3 border-t border-gray-100 text-center" x-show="searchHistory.length > 0">
      <button @click="clearSearchHistory; showSearchHistory = false" class="text-xs text-gray-400 hover:text-red-500">
        清空全部历史
      </button>
    </div>
  </div>
</div>

<!-- 书源列表 -->
<div @click.self="showSources = false"
     class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm"
     x-transition:enter="transition ease-out duration-200" x-transition:enter-end="opacity-100"
     x-transition:enter-start="opacity-0"
     x-transition:leave="transition ease-in duration-150" x-transition:leave-end="opacity-0"
     x-cloak
     x-show="showSources"
     x-transition:leave-start="opacity-100">
  <div class="w-full max-w-lg rounded-2xl bg-white p-6 shadow-2xl ring-1 ring-gray-900/5 max-h-[80vh] flex flex-col"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 translate-y-2 scale-95"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-end="opacity-0 translate-y-2 scale-95"
       x-transition:enter-end="opacity-100 translate-y-0 scale-100"
       x-transition:leave-start="opacity-100 translate-y-0 scale-100">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-lg font-semibold text-gray-800">书源列表</h3>
      <div class="flex items-center gap-2">
        <button @click="checkSources()" :disabled="sourcesChecking"
                class="text-xs text-primary hover:text-primary-hover px-2 py-1 border border-primary/30 rounded-lg hover:bg-primary/5 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
          <span x-show="!sourcesChecking">测试延迟</span>
          <span x-show="sourcesChecking">测试中...</span>
        </button>
        <button @click="showSources = false" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;
        </button>
      </div>
    </div>
    <div class="flex-1 overflow-y-auto -mx-2 px-2">
      <template x-for="s in sources" :key="s.id">
        <div class="flex items-center justify-between px-3 py-2.5 border-b border-gray-100 last:border-b-0">
          <div class="flex-1 min-w-0 mr-3">
            <div class="text-sm font-medium text-gray-800 truncate" x-text="s.name"></div>
            <div class="text-xs text-gray-400 truncate" x-text="s.url"></div>
          </div>
          <div class="flex items-center gap-2 shrink-0">
            <span class="text-xs" x-show="s.delay != null"
                  :class="s.delay < 0 ? 'text-red-500' : 'text-green-500'"
                  x-text="s.delay < 0 ? '超时' : s.delay + ' ms'"></span>

            <span class="inline-flex items-center px-1.5 py-0.5 rounded text-xs font-medium"
                  :class="s.disabled ? 'bg-red-50 text-red-500' : 'bg-green-50 text-green-600'"
                  x-text="s.disabled ? '禁用' : '启用'"></span>
          </div>
        </div>
      </template>
    </div>
    <div class="text-center py-8 text-sm text-gray-400" x-show="sources.length === 0">暂无书源</div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  function App() {
    return {
      SEARCH_HISTORY_KEY: 'sonovel-search-history',
      SETTINGS_KEY: 'sonovel-settings',

      bookCache: [],
      currentPage: 1,
      dropdownItem: null,
      dropdownStyle: '',
      isSearching: false,
      latestFileName: '',
      localBooks: [],
      openDropdownIndex: null,
      searchHistory: [],
      searchKeyword: '',
      suggestions: [],
      showSuggestions: false,
      serverConfig: { searchLimit: -1, concurrency: -1, version: '', extName: 'epub' },
      settings: { format: '', language: '', searchLimit: '', concurrency: '', showSuggestionsEnabled: true },
      settingsVisible: false,
      showSearchHistory: false,
      showSources: false,
      sources: [],
      sourcesChecking: false,
      iconDownload: '<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" stroke-linecap="round" stroke-linejoin="round"/><polyline points="7 10 12 15 17 10" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="15" x2="12" y2="3" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      iconDelete: '<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6" stroke-linecap="round" stroke-linejoin="round"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      showTip: false,
      tipText: '正在加载...',
      downloadCurrent: 0,
      downloadTotal: 0,

      get concurrencyMax() {return this.serverConfig.concurrency > 0 ? this.serverConfig.concurrency : 50},
      get defaultExtLabel() {
        const ext = this.settings.format || this.serverConfig.extName || 'epub'
        return ext.toUpperCase()
      },
      get pageSize() {
        const v = Number.parseInt(this.settings.searchLimit)
        return v > 0 ? v : 20
      },
      get paginatedBooks() {
        const start = (this.currentPage - 1) * this.pageSize
        return this.bookCache.slice(start, start + this.pageSize)
      },
      get paginationInfo() {
        const maxVisible = 5
        let start = Math.max(1, this.currentPage - Math.floor(maxVisible / 2))
        let end = Math.min(this.totalPages, start + maxVisible - 1)
        if (end - start < maxVisible - 1) start = Math.max(1, end - maxVisible + 1)
        const pages = []
        for (let i = start; i <= end; i++) pages.push(i)
        return { start, end, pages }
      },
      get searchLimitMax() {return this.serverConfig.searchLimit > 0 ? this.serverConfig.searchLimit : 100},
      get totalPages() {return Math.max(1, Math.ceil(this.bookCache.length / this.pageSize))},
      get versionLink() {return this.serverConfig.version ? `https://github.com/freeok/so-novel/releases/tag/v${this.serverConfig.version}` : '#'},

      init() {
        this.loadSettings()
        this.fetchConfig()
        this.fetchLocalBooks()
        this.initSSE()
        this.loadSearchHistory()
      },

      changePage(page) {
        this.closeDownloadMenu()
        if (page === 'prev') this.currentPage--; else if (page === 'next') this.currentPage++; else this.currentPage = Number.parseInt(page)
        this.currentPage = Math.max(1, Math.min(this.currentPage, this.totalPages))
        const el = document.getElementById('downloadContainer')
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' })
      },

      clearSearchHistory() {
        if (!confirm('确定清空全部搜索历史？')) return
        this.searchHistory = []
        localStorage.removeItem(this.SEARCH_HISTORY_KEY)
      },

      async fetchSuggestions() {
        const kw = this.searchKeyword.trim()
        if (!kw) {
          this.suggestions = [];
          this.showSuggestions = false;
          return
        }
        try {
          const data = await Api.getSuggestions(kw)
          if (data && data.code === 200) {
            this.suggestions = data.data || []
            this.showSuggestions = this.suggestions.length > 0
          }
        } catch (_) {
          this.suggestions = [];
          this.showSuggestions = false
        }
      },

      selectSuggestion(index) {
        this.searchKeyword = this.suggestions[index]
      },

      closeSuggestions() {
        setTimeout(() => { this.showSuggestions = false }, 200)
      },

      removeSearchHistory(timestamp) {
        if (!confirm('确定删除该条搜索历史？')) return
        this.searchHistory = this.searchHistory.filter(h => h.timestamp !== timestamp)
        localStorage.setItem(this.SEARCH_HISTORY_KEY, JSON.stringify(this.searchHistory))
      },

      closeDownloadMenu() {
        this.openDropdownIndex = null
        this.dropdownItem = null
        this.dropdownStyle = ''
      },

      displayTip(text = '正在加载...') {
        this.tipText = text
        this.showTip = true
      },

      async fetchConfig() {
        try {
          const data = await Api.getConfig()
          if (data && data.data) Object.assign(this.serverConfig, data.data)
        } catch (_) {}
      },

      async fetchSources() {
        try {
          const data = await Api.getSources()
          if (data && data.data) this.sources = data.data
        } catch (_) {}
      },

      async checkSources() {
        this.sourcesChecking = true
        try {
          const data = await Api.checkSources()
          if (data && data.data) this.sources = data.data
        } catch (_) {}
        this.sourcesChecking = false
      },

      async aggregatedSearch() {
        const value = this.searchKeyword.trim()
        if (!value) {
          alert('请输入书名或作者！')
          return
        }
        this.closeDownloadMenu()
        this.showSearchHistory = false
        this.displayTip('正在搜索...')
        this.isSearching = true
        try {
          const data = await Api.search(value)
          if (data && data.data) {
            this.bookCache = data.data
            this.currentPage = 1
            this.saveSearchHistory(value, data.data)
          }
        } catch (error) {alert(`搜索失败: ${error.message}`)} finally {
          this.hideTip()
          this.isSearching = false
        }
      },

      async handleDownloadToServer(item, format) {
        this.closeDownloadMenu()
        if (!item) {
          alert('参数错误，请重新搜索')
          return
        }
        this.downloadCurrent = 0
        this.downloadTotal = 0
        this.displayTip('正在解析目录...')
        const params = new URLSearchParams({ ...item })
        const finalFormat = format || this.settings.format || ''
        if (finalFormat) params.set('format', finalFormat)
        if (this.settings.language) params.set('language', this.settings.language)
        if (this.settings.concurrency) params.set('concurrency', this.settings.concurrency)
        try {
          const resp = await Api.downloadBook(params)
          if (!resp.ok) {
            const data = await resp.json()
            throw new Error(data.message || '未知错误')
          }
          await this.fetchLocalBooks()
          location.href = `/book-download?filename=${encodeURIComponent(this.latestFileName)}`
        } catch (error) {alert(`下载书籍到服务器失败: ${error.message}`)} finally {this.hideTip()}
      },

      async fetchLocalBooks() {
        this.displayTip('正在刷新...')
        try {
          const data = await Api.getLocalBooks()
          if (data && data.data) {
            data.data.sort((a, b) => b.timestamp - a.timestamp)
            if (data.data[0]) this.latestFileName = data.data[0].name
            this.localBooks = data.data
          }
        } catch (error) {alert(`刷新已下书籍失败: ${error.message}`)} finally {this.hideTip()}
      },

      async handleDeleteBook(filename) {
        if (!confirm(`确定删除「${filename}」？`)) return
        try {
          const res = await Api.deleteBook(filename)
          if (res.code === 200) {
            this.localBooks = this.localBooks.filter(item => item.name !== filename)
          } else {
            alert('删除失败: ' + (res.message || '未知错误'))
          }
        } catch (error) {
          alert('删除失败: ' + error.message)
        }
      },

      formatDate(timestamp) {
        return new Date(timestamp).toLocaleString('zh-CN', {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit'
        })
      },

      formatHistoryTime(ts) {
        const diff = Date.now() - ts
        if (diff < 60000) return '刚刚'
        if (diff < 3600000) return `${Math.floor(diff / 60000)}分钟前`
        if (diff < 86400000) return `${Math.floor(diff / 3600000)}小时前`
        const d = new Date(ts)
        return `${d.getMonth() + 1}月${d.getDate()}日 ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`
      },

      formatSize(bytes) {
        if (bytes === 0) return '0.00 B'
        const k = 1024
        const sizes = ['B', 'KB', 'MB', 'GB']
        const i = Math.floor(Math.log(bytes) / Math.log(k))
        return `${(bytes / Math.pow(k, i)).toFixed(2)} ${sizes[i]}`
      },

      getGlobalIndex(index) {
        return (this.currentPage - 1) * this.pageSize + index + 1
      },

      handleDownloadFileToLocal(name) {
        location.href = `/book-download?filename=${encodeURIComponent(name)}`
      },

      handleSettingChange() {
        localStorage.setItem(this.SETTINGS_KEY, JSON.stringify(this.settings))
        if (this.bookCache.length > 0) this.currentPage = 1
      },

      hideTip() {
        this.showTip = false
        this.downloadCurrent = 0
        this.downloadTotal = 0
      },

      initSSE() {
        const evtSource = new EventSource('/download-progress')
        evtSource.onopen = (event) => {
          console.log("✅ SSE 已连接")
        }
        evtSource.onerror = (event) => {
          console.warn("❌ SSE 连接异常，浏览器将自动重连", event)
        }
        evtSource.onmessage = (e) => {
          try {
            const data = JSON.parse(e.data)
            if (data.type === 'download-progress') {
              this.downloadCurrent = data.index
              this.downloadTotal = data.total
            }
          } catch (err) {
            console.error("❌ SSE 数据解析失败:", err, e.data)
          }
        }
      },

      loadSearchHistory() {
        try {
          this.searchHistory = JSON.parse(localStorage.getItem(this.SEARCH_HISTORY_KEY) || '[]')
        } catch (_) { this.searchHistory = [] }
      },

      loadSettings() {
        try {
          const saved = JSON.parse(localStorage.getItem(this.SETTINGS_KEY) || '{}')
          this.settings.format = saved.format || ''
          this.settings.language = saved.language || ''
          this.settings.searchLimit = saved.searchLimit || ''
          this.settings.concurrency = saved.concurrency || ''
        } catch (_) {}
      },

      saveSearchHistory(keyword, results) {
        const entry = { keyword, results, timestamp: Date.now() }
        this.searchHistory = this.searchHistory.filter(h => h.keyword !== keyword)
        this.searchHistory.unshift(entry)
        if (this.searchHistory.length > 20) this.searchHistory = this.searchHistory.slice(0, 20)
        localStorage.setItem(this.SEARCH_HISTORY_KEY, JSON.stringify(this.searchHistory))
      },

      selectHistory(item) {
        this.searchKeyword = item.keyword
        this.bookCache = item.results
        this.currentPage = 1
        this.showSearchHistory = false
      },

      toggleDownloadMenu(index, item, event) {
        if (this.openDropdownIndex === index) {
          this.closeDownloadMenu()
          return
        }
        const rect = event.currentTarget.getBoundingClientRect()
        const menuWidth = 144
        const menuHeight = 200
        let top = rect.bottom + 6
        if (top + menuHeight > window.innerHeight - 8) top = rect.top - menuHeight - 6
        let left = rect.right - menuWidth
        left = Math.max(8, Math.min(left, window.innerWidth - menuWidth - 8))
        this.openDropdownIndex = index
        this.dropdownItem = item
        this.dropdownStyle = `top:${top}px;left:${left}px`
      },

      validateAndSaveSettings(field) {
        let val = Number.parseInt(this.settings[field])
        if (field === 'searchLimit') {
          if (val > this.searchLimitMax) this.settings.searchLimit = this.searchLimitMax
          if (val < 10 && this.settings.searchLimit !== '') this.settings.searchLimit = 10
        } else if (field === 'concurrency') {
          if (val > this.concurrencyMax) this.settings.concurrency = this.concurrencyMax
          if (val < 1 && this.settings.concurrency !== '') this.settings.concurrency = 1
        }
        this.handleSettingChange()
      }
    }
  }
</script>
